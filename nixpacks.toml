# =========================================================
# Trenchlets · root-level Nixpacks config (web service)
# =========================================================
# When Railway deploys from the repo root, this file tells Nixpacks
# how to build:
#   1. Install Node 22 (Vite 7 needs >=20.19, we pick 22 to be safe)
#   2. Install root deps + server deps
#   3. Build the Vite frontend into ./dist
#   4. Start the Node server (which serves dist + WS + API)
#
# Settler is a SEPARATE Railway service — set its Root Directory to
# `settler` and Railway will use settler/nixpacks.toml instead.

[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = [
  "npm install --no-audit --no-fund",
  "npm install --prefix server --no-audit --no-fund",
]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "npm start"
